<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Redirecting…</title>
</head>
<body>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const q = params.get('q') || '';
  const base = 'https://noai.duckduckgo.com/';
  const target = q ? base + '?q=' + encodeURIComponent(q) : base;
  location.replace(target);
})();
</script>
<noscript>
  <p>Redirecting... <a id="redir" href="https://noai.duckduckgo.com/">Continue</a></p>
  <script>
    (function(){
      const params = new URLSearchParams(location.search);
      const q = params.get('q') || '';
      document.getElementById('redir').href = q ? 'https://noai.duckduckgo.com/?q=' + encodeURIComponent(q) : 'https://noai.duckduckgo.com/';
    })();
  </script>
</noscript>
</body>
</html>
